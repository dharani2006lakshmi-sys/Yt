<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MVAB Player</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', system-ui, sans-serif; }

  body {
    min-height: 100vh;
    background: radial-gradient(circle at 20% 20%, #2b1055 0%, #0a0a1a 45%, #05050c 100%);
    background-attachment: fixed;
    color: #f0f0f5;
    display: flex;
    justify-content: center;
    padding: 40px 16px;
    overflow-x: hidden;
  }

  body::before {
    content: '';
    position: fixed;
    top: -20%; left: -20%;
    width: 60vw; height: 60vw;
    background: radial-gradient(circle, rgba(120,80,255,0.25), transparent 70%);
    filter: blur(60px);
    z-index: -1;
  }
  body::after {
    content: '';
    position: fixed;
    bottom: -20%; right: -20%;
    width: 60vw; height: 60vw;
    background: radial-gradient(circle, rgba(255,60,140,0.2), transparent 70%);
    filter: blur(60px);
    z-index: -1;
  }

  .container { width: 100%; max-width: 720px; }

  .glass {
    background: rgba(255, 255, 255, 0.06);
    backdrop-filter: blur(18px) saturate(160%);
    -webkit-backdrop-filter: blur(18px) saturate(160%);
    border: 1px solid rgba(255, 255, 255, 0.12);
    border-radius: 20px;
    box-shadow: 0 8px 32px rgba(0,0,0,0.4);
  }

  header.glass {
    padding: 20px 26px;
    margin-bottom: 20px;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  header h1 {
    font-size: 1.3rem;
    font-weight: 700;
    letter-spacing: 0.5px;
    background: linear-gradient(90deg, #b18aff, #ff8ac2);
    -webkit-background-clip: text;
    background-clip: text;
    color: transparent;
  }

  .badge {
    font-size: 0.7rem;
    padding: 4px 10px;
    border-radius: 20px;
    background: rgba(120, 80, 255, 0.25);
    border: 1px solid rgba(177, 138, 255, 0.4);
    color: #d6c6ff;
  }

  .search-bar.glass {
    display: flex;
    gap: 10px;
    padding: 10px;
    margin-bottom: 24px;
  }

  .search-bar input {
    flex: 1;
    background: transparent;
    border: none;
    outline: none;
    color: #fff;
    font-size: 0.95rem;
    padding: 12px 14px;
  }
  .search-bar input::placeholder { color: rgba(255,255,255,0.4); }

  .btn {
    border: none;
    border-radius: 14px;
    padding: 12px 22px;
    font-weight: 600;
    font-size: 0.9rem;
    cursor: pointer;
    background: linear-gradient(135deg, #8a5cff, #ff5ca8);
    color: #fff;
    transition: transform 0.15s ease, opacity 0.15s ease;
  }
  .btn:active { transform: scale(0.96); }
  .btn:disabled { opacity: 0.5; cursor: not-allowed; }

  .status {
    text-align: center;
    color: rgba(255,255,255,0.5);
    font-size: 0.85rem;
    padding: 20px;
    display: none;
  }
  .status.show { display: block; }

  .player-card.glass {
    padding: 18px;
    margin-bottom: 20px;
    display: none;
  }
  .player-card.show { display: block; }

  .thumb-wrap {
    position: relative;
    width: 100%;
    border-radius: 14px;
    overflow: hidden;
    margin-bottom: 16px;
    background: #000;
  }

  video {
    width: 100%;
    display: block;
    border-radius: 14px;
    background: #000;
    max-height: 400px;
  }

  .meta { padding: 4px 6px 14px; }
  .meta h2 { font-size: 1.05rem; margin-bottom: 4px; }
  .meta p { font-size: 0.8rem; color: rgba(255,255,255,0.55); }

  .quality-row {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
    padding: 4px 6px;
  }

  .quality-pill {
    background: rgba(255,255,255,0.08);
    border: 1px solid rgba(255,255,255,0.15);
    color: #e6e0ff;
    padding: 8px 14px;
    border-radius: 30px;
    font-size: 0.78rem;
    cursor: pointer;
    transition: background 0.15s ease, border-color 0.15s ease;
  }
  .quality-pill:hover { background: rgba(177,138,255,0.2); }
  .quality-pill.active {
    background: linear-gradient(135deg, #8a5cff, #ff5ca8);
    border-color: transparent;
    color: #fff;
  }

  .error-box {
    display: none;
    padding: 14px 18px;
    border-radius: 14px;
    background: rgba(255, 70, 90, 0.12);
    border: 1px solid rgba(255, 70, 90, 0.35);
    color: #ffb3bd;
    font-size: 0.85rem;
    margin-bottom: 20px;
  }
  .error-box.show { display: block; }

  ::-webkit-scrollbar { width: 8px; }
  ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.15); border-radius: 10px; }
</style>
</head>
<body>
  <div class="container">
    <header class="glass">
      <h1>MVAB Player</h1>
      <span class="badge">Innertube</span>
    </header>

    <div class="search-bar glass">
      <input id="urlInput" type="text" placeholder="Paste YouTube URL or video ID...">
      <button class="btn" id="loadBtn">Load</button>
    </div>

    <div class="error-box" id="errorBox"></div>
    <div class="status" id="statusText">Fetching video info...</div>

    <div class="player-card glass" id="playerCard">
      <div class="thumb-wrap">
        <video id="videoEl" controls playsinline></video>
      </div>
      <div class="meta">
        <h2 id="videoTitle">—</h2>
        <p id="videoAuthor">—</p>
      </div>
      <div class="quality-row" id="qualityRow"></div>
    </div>
  </div>

<script>
  const urlInput = document.getElementById('urlInput');
  const loadBtn = document.getElementById('loadBtn');
  const statusText = document.getElementById('statusText');
  const errorBox = document.getElementById('errorBox');
  const playerCard = document.getElementById('playerCard');
  const videoEl = document.getElementById('videoEl');
  const videoTitle = document.getElementById('videoTitle');
  const videoAuthor = document.getElementById('videoAuthor');
  const qualityRow = document.getElementById('qualityRow');

  let currentVideoId = null;

  function showError(msg) {
    errorBox.textContent = msg;
    errorBox.classList.add('show');
  }
  function hideError() {
    errorBox.classList.remove('show');
  }
  function setLoading(loading) {
    statusText.classList.toggle('show', loading);
    loadBtn.disabled = loading;
  }

  async function loadVideo() {
    const value = urlInput.value.trim();
    if (!value) return showError('Paste a YouTube URL or video ID first.');

    hideError();
    playerCard.classList.remove('show');
    setLoading(true);

    try {
      const res = await fetch('/api/formats', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ videoId: value }),
      });
      const data = await res.json();
      if (!res.ok) throw new Error(data.error || 'Failed to load video');

      currentVideoId = data.videoId;
      videoTitle.textContent = data.title || 'Untitled';
      videoAuthor.textContent = data.author || '';

      // Prefer formats with both audio+video for simple playback
      const playable = data.formats
        .filter(f => f.hasAudio && f.hasVideo)
        .sort((a, b) => (b.bitrate || 0) - (a.bitrate || 0));

      const list = playable.length ? playable : data.formats;

      qualityRow.innerHTML = '';
      list.slice(0, 6).forEach((f, i) => {
        const pill = document.createElement('button');
        pill.className = 'quality-pill' + (i === 0 ? ' active' : '');
        pill.textContent = f.quality || `itag ${f.itag}`;
        pill.onclick = () => selectFormat(f.itag, pill);
        qualityRow.appendChild(pill);
      });

      if (list.length) playStream(list[0].itag);
      playerCard.classList.add('show');
    } catch (err) {
      showError(err.message);
    } finally {
      setLoading(false);
    }
  }

  function selectFormat(itag, pillEl) {
    document.querySelectorAll('.quality-pill').forEach(p => p.classList.remove('active'));
    pillEl.classList.add('active');
    playStream(itag);
  }

  function playStream(itag) {
    if (!currentVideoId) return;
    videoEl.src = `/api/stream?videoId=${encodeURIComponent(currentVideoId)}&itag=${itag}`;
    videoEl.play().catch(() => {});
  }

  loadBtn.addEventListener('click', loadVideo);
  urlInput.addEventListener('keydown', e => { if (e.key === 'Enter') loadVideo(); });
</script>
</body>
</html>
